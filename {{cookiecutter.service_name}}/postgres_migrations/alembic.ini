# Alembic configuration for {{ cookiecutter.service_name }} PostgreSQL migrations.
# Canonical path: postgres_migrations/alembic.ini
# Invoked as: .venv/bin/alembic -c postgres_migrations/alembic.ini …

[alembic]
# %(here)s = directory containing this config file (postgres_migrations/)
script_location = %(here)s
# URL is overridden at runtime by postgres_migrations/env.py (PostgresSettings / .env)
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
